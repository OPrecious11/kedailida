<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Cover Illustration — Kedailida</title>
<link rel="icon" type="image/x-icon" href="/assets/Logo Stamp.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Jost:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Orbitron:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">
        <img src="assets/kedailida Logo Variations-07 2.png" alt="Kedailida">
      </a>
      <nav>
        <ul class="nav-links">
          <li><a href="portfolio.html">Portfolio</a></li>
          <li><a href="services.html" class="active">Services</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
      <a href="contact.html" class="btn-nav-cta">Start Project</a>
    </div>
  </header>

  <section class="explore-frame">
    <img id="exploreImg" src="" alt="" class="explore-bg">
    <div class="explore-fade"></div>

    <div class="explore-tabs-glass" id="exploreTabs">
      <div class="explore-tab-indicator" id="tabIndicator"></div>
      <button class="explore-tab active" data-index="0">Basic Illustration</button>
      <button class="explore-tab" data-index="1">Standard Illustration</button>
      <button class="explore-tab" data-index="2">Premium Illustration</button>
    </div>

    <div class="explore-body" id="exploreBody">

      <div class="explore-content">
        <span class="explore-tag" id="exploreTag">BOOK COVER ILLUSTRATION</span>
        <h1 class="explore-title" id="exploreTitle"></h1>
      </div>

      <div class="glass-includes">
        <h4>Includes</h4>
        <ul id="exploreIncludes"></ul>
      </div>

      <div class="glass-bestfor">
        <h4>Best For</h4>
        <ul id="exploreBestFor"></ul>
      </div>

      <div class="glass-deliverables">
        <span><b>Deliverables:</b> <span id="exploreDeliverables"></span></span>
      </div>

    </div>
  </section>

  <script src="js/book-cover.js"></script>
</body>
</html>
